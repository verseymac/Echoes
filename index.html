<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Echoes</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <header>
    <h1>Echoes</h1>

    <p class="tagline">
      Discover the echoes of history around you
    </p>
  </header>

  <!-- ========================= -->
  <!-- TABS -->
  <!-- ========================= -->

  <div id="tabs">

    <button data-tab="discover">
      🧭 Discover
    </button>

    <button data-tab="echoes">
      📖 Echoes
    </button>

    <button data-tab="user">
      ⚙️ User
    </button>

  </div>

  <!-- ========================= -->
  <!-- DISCOVER PAGE -->
  <!-- ========================= -->

  <div id="discover-page">

    <div id="controls">

      <label>
        Search Radius:

        <select id="radius">
          <option value="1">1 km</option>
          <option value="5" selected>5 km</option>
          <option value="10">10 km</option>
          <option value="25">25 km</option>
        </select>

      </label>

    </div>

    <div id="map"></div>

    <div id="details">

      <h2>Nearby Echoes</h2>

      <div id="content">
        Select an Echo to learn its story
      </div>

    </div>

  </div>

  <!-- ========================= -->
  <!-- ECHOES PAGE -->
  <!-- ========================= -->

  <div
    id="echoes-page"
    style="display:none"
  >

    <div id="details">

      <h2>My Echoes</h2>

      <div id="echoes-list">
        No Echoes discovered yet.
      </div>

      <hr>

      <div id="echoes-details">
        Select an Echo to read it again.
      </div>

    </div>

  </div>

  <!-- ========================= -->
  <!-- USER PAGE -->
  <!-- ========================= -->

  <div
    id="user-page"
    style="display:none"
  >

    <div id="details">

      <h2>User</h2>

      <p>
        Echoes discovered:
        <span id="echo-count">0</span>
      </p>

      <button id="reset-echoes">
        Reset Discoveries
      </button>

    </div>

  </div>

  <!-- ========================= -->
  <!-- APP -->
  <!-- ========================= -->

  <script
    type="module"
    src="js/app.js"
  ></script>

</body>
</html>
